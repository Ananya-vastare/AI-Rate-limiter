spring.application.name=ai-aware-rate-limiter

# ---------------------------------------------------------------------------
# Rate limiter core config
# ---------------------------------------------------------------------------
# storage.type = memory (default, zero external deps) | redis
ratelimiter.storage.type=memory

# Fixed window length applied to both RPM and TPM buckets.
ratelimiter.window-seconds=60

# Global default policy applied to any client without a specific override.
ratelimiter.default-policy.requests-per-minute=60
ratelimiter.default-policy.tokens-per-minute=10000

# Example per-client overrides (uncomment / edit as needed).
# ratelimiter.client-policies.premium-client.requests-per-minute=600
# ratelimiter.client-policies.premium-client.tokens-per-minute=200000
# ratelimiter.client-policies.free-tier-client.requests-per-minute=10
# ratelimiter.client-policies.free-tier-client.tokens-per-minute=1000

# In-memory store housekeeping: sweep expired windows every 30s so idle
# clients don't hold memory forever (mirrors Redis TTL expiry).
ratelimiter.cleanup.enabled=true
ratelimiter.cleanup.interval-ms=30000

# ---------------------------------------------------------------------------
# Redis connection (only read when ratelimiter.storage.type=redis)
# ---------------------------------------------------------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# ---------------------------------------------------------------------------
# Server / misc
# ---------------------------------------------------------------------------
server.port=8080
